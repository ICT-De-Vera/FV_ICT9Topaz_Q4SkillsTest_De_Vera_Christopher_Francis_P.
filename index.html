<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
    <title>Skills Test</title>
<style>
    body {
        background-image: url('https://img.freepik.com/free-vector/wavy-style-abstract-big-particle-dark-banner-flow-motion_1017-60698.jpg?semt=ais_hybrid&w=740&q=80');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center 0px;
        font-family: 'Michroma', sans-serif;
    }
    .background-image {
        position: fixed;
        top: 1000px;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 700px;
      width: 100%;
      height: 425px;
      color: rgb(255, 255, 255);;
      background-color: rgb(20, 20, 20);
    }
</style>
</head>
<body>
      <div class="page-wrapper">
    <div class="card shadow">
      <div class="card-body">
        <h1 class="text-center mb-3">Arashi Academy</h1>
        <h2 class="h5 text-center mb-4">Login</h2>

        <details class="ontoggle">
          <summary>Instructions</summary>
          Please fill out the login credentials below.
          Click "Login" when you are done.
        </details>

        <form id="registrationForm">
          <div class="row">
            <div class="col-lg-12 mb-3">
              <label for="Username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" required placeholder="Enter your username">
            </div>
          </div>

          <div class="row">
            <div class="col-lg-12 mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required placeholder="Enter your password">
            </div>
          </div>


          <div class="row">
          <div class="d-flex justify-content-end gap-2 col-lg-12 mb-3">
            <button type="button" id="Login" onclick="function_name()" class="btn btn-primary w-100">Login</button>
          </div>
          </div>
        </form>
      </div>
    </div>
</div>
    <script>
        // start with function
let attempt_counter = 0;

function function_name() {

//declare variables for retrieving input field values and variables for granted and denied messages.
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

do {
        
        if (username === "admin" && password === "password") {
            alert("Login successful!"+"   Welcome, " + username + ".");
            attempt_counter = 0; // reset after success
            window.location.href = "notebooks.html"; //go to second page
            break; // stop loop
        } 
        if (username === "" || password === "") {
            alert("Please fill in all fields.");
            break;
        }
        if (username === "student no.1" && password === "123456789") {
            alert("Login successful!"+"   Welcome, " + username + "." );
            attempt_counter = 0; // reset after success
            window.location.href = "notebooks.html"; //go to second page
            break; // stop loop
        }
        if (username === "student no.2" && password === "987654321") {
            alert("Login successful!"+"   Welcome, " + username + "." );
            attempt_counter = 0; // reset after success
            window.location.href = "notebooks.html"; //go to second page
            break; // stop loop
        }
         else {
            attempt_counter++;
            document.getElementById().innerHTML = alert("Incorrect username and/or password. Attempt " + attempt_counter + " of 3");
        }

    } while (false); 

    if (attempt_counter >= 3) {
        alert("Maximum login attempts exceeded.");
        document.getElementById("Login").disabled = true; // lock button
    }
}
    </script>
</body>
</html>
